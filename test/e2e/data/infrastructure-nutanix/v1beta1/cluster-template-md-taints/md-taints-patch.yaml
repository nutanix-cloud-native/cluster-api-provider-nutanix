# Pre-existing taints required by CAPI md_rollout e2e test (MachineTaintPropagation).
# See: sigs.k8s.io/cluster-api/test/e2e/md_rollout.go
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: "${CLUSTER_NAME}-wmd"
spec:
  template:
    spec:
      taints:
        - key: "pre-existing-always-taint"
          value: "always-value"
          effect: PreferNoSchedule
          propagation: Always
        - key: "pre-existing-on-initialization-taint"
          value: "on-initialization-value"
          effect: PreferNoSchedule
          propagation: OnInitialization
