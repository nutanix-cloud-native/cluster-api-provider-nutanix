apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-kcp"
spec:
  kubeadmConfigSpec:
    format: ignition
    ignition:
      containerLinuxConfig:
        # Order kubeadm after containerd and after oem-cloudinit.service
        # (Flatcar's Nutanix ConfigDrive handler that sets the hostname).
        additionalConfig: |
          systemd:
            units:
            - name: kubeadm.service
              enabled: true
              dropins:
              - name: 10-flatcar.conf
                contents: |
                  [Unit]
                  Requires=containerd.service oem-cloudinit.service
                  After=containerd.service oem-cloudinit.service
    # Flatcar-specific {pre,post}KubeadmCommands. CAPI's Ignition bootstrap
    # writes the kubeadm config at /etc/kubeadm.yml, then `mv`s it to /tmp
    # after `kubeadm init`, so postKubeadm guards also check /tmp/kubeadm.yml.
    preKubeadmCommands:
      - echo "before kubeadm call" > /var/log/prekubeadm.log
      # Flatcar has no cloud-init to expand ${VAR}s in /etc/kubeadm.yml; do it ourselves.
      - |
        envsubst < /etc/kubeadm.yml > /etc/kubeadm.yml.tmp
        mv /etc/kubeadm.yml.tmp /etc/kubeadm.yml
      - echo "::1         ipv6-localhost ipv6-loopback" >/etc/hosts
      - echo "127.0.0.1   localhost" >>/etc/hosts
      - echo "127.0.0.1   kubernetes" >>/etc/hosts
      # kubeadm >=1.29: point kube-vip at super-admin.conf for the init window.
      - |
        KUBERNETES_VERSION_NO_V=${KUBERNETES_VERSION#v}
        VERSION_TO_COMPARE=1.29.0
        if [ "$(printf '%s\n' "$KUBERNETES_VERSION_NO_V" "$VERSION_TO_COMPARE" | sort -V | head -n1)" != "$KUBERNETES_VERSION_NO_V" ]; then
          if [ -f /run/kubeadm/kubeadm.yaml ] || [ -f /etc/kubeadm.yml ]; then
            sed -i 's#path: /etc/kubernetes/admin.conf#path: /etc/kubernetes/super-admin.conf#' /etc/kubernetes/manifests/kube-vip.yaml;
          fi
        fi
      # kubeadm <1.33: inject cloud-provider: external into apiServer extraArgs.
      - |
        KUBERNETES_VERSION_NO_V=${KUBERNETES_VERSION#v}
        VERSION_TO_COMPARE=1.33.0
        if [ "$(printf '%s\n' "$KUBERNETES_VERSION_NO_V" "$VERSION_TO_COMPARE" | sort -V | head -n1)" = "$KUBERNETES_VERSION_NO_V" ] && [ "$KUBERNETES_VERSION_NO_V" != "$VERSION_TO_COMPARE" ]; then
          for KUBEADM_CONFIG_FILE in /run/kubeadm/kubeadm.yaml /etc/kubeadm.yml; do
            if [ -f "$KUBEADM_CONFIG_FILE" ]; then
              sed -i '/apiServer:/,/extraArgs:/s/extraArgs:/extraArgs:\n  - name: cloud-provider\n    value: external/' "$KUBEADM_CONFIG_FILE"
              echo "Added cloud-provider: external to apiServer configuration in $KUBEADM_CONFIG_FILE" > /var/log/cloud-provider-config.log
            fi
          done
        fi
    postKubeadmCommands:
      - echo export KUBECONFIG=/etc/kubernetes/admin.conf >> /root/.bashrc
      # Swap kube-vip back to admin.conf once init is done. File has been
      # moved to /tmp/kubeadm.yml by CAPI Ignition by this point.
      - |
        KUBERNETES_VERSION_NO_V=${KUBERNETES_VERSION#v}
        VERSION_TO_COMPARE=1.29.0
        if [ "$(printf '%s\n' "$KUBERNETES_VERSION_NO_V" "$VERSION_TO_COMPARE" | sort -V | head -n1)" != "$KUBERNETES_VERSION_NO_V" ]; then
          if [ -f /run/kubeadm/kubeadm.yaml ] || [ -f /etc/kubeadm.yml ] || [ -f /tmp/kubeadm.yml ]; then
            sed -i 's#path: /etc/kubernetes/super-admin.conf#path: /etc/kubernetes/admin.conf#' /etc/kubernetes/manifests/kube-vip.yaml;
          fi
        fi
      - echo "after kubeadm call" > /var/log/postkubeadm.log
