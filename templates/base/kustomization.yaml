apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${NAMESPACE}


resources:
- ../ccm
- ./cm.yaml
- ./secret.yaml
- ./nutanix-cluster.yaml
- ./cluster-without-topology.yaml
- ./kcp.yaml
- ./kct.yaml
- ./nmt.yaml
- ./md.yaml
- ./mhc.yaml
patches:
# Strategic merge patch: add CCM label to Cluster (map field — no list-replacement issue).
- path: ./ccm-patch.yaml
# JSON patches: use op:add /- to append cloud-provider to list fields.
# Strategic merge patch would replace the entire list, silently dropping any other
# extraArgs/kubeletExtraArgs entries already defined in kcp.yaml and kct.yaml.
- target:
    kind: KubeadmControlPlane
  patch: |-
    - op: add
      path: /spec/kubeadmConfigSpec/clusterConfiguration/controllerManager/extraArgs/-
      value:
        name: cloud-provider
        value: external
    - op: add
      path: /spec/kubeadmConfigSpec/initConfiguration/nodeRegistration/kubeletExtraArgs/-
      value:
        name: cloud-provider
        value: external
    - op: add
      path: /spec/kubeadmConfigSpec/joinConfiguration/nodeRegistration/kubeletExtraArgs/-
      value:
        name: cloud-provider
        value: external
- target:
    kind: KubeadmConfigTemplate
  patch: |-
    - op: add
      path: /spec/template/spec/joinConfiguration/nodeRegistration/kubeletExtraArgs/-
      value:
        name: cloud-provider
        value: external
