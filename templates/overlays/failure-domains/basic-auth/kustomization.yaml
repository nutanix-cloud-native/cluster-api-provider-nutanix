apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../failure-domains

patches:
- target:
    kind: Secret
    name: '\$\{CLUSTER_NAME\}'
  patch: |-
    - op: replace
      path: /stringData/credentials
      value: |
        [
          {
            "type": "basic_auth",
            "data": {
              "prismCentral":{
                "username": "${NUTANIX_USER}",
                "password": "${NUTANIX_PASSWORD}"
              },
              "prismElements": null
            }
          }
        ]
