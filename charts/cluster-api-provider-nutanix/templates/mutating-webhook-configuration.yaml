apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: {{ template "chart.name" . }}-mutating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: {{ printf "%s/%s-admission-tls" .Release.Namespace (include "chart.name" .) | quote }}
webhooks:
- name: mutate-nutanixmachine.infrastructure.cluster.x-k8s.io
  admissionReviewVersions: ["v1", "v1beta1"]
  clientConfig:
    service:
      namespace: {{ .Release.Namespace }}
      name: {{ template "chart.name" . }}-admission
      path: /mutate-infrastructure-cluster-x-k8s-io-v1beta1-nutanixmachine
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["infrastructure.cluster.x-k8s.io"]
    apiVersions: ["v1beta1"]
    resources: ["nutanixmachines"]
  failurePolicy: Fail
  sideEffects: None
  timeoutSeconds: 10
- name: mutate-nutanixmachinetemplate.infrastructure.cluster.x-k8s.io
  admissionReviewVersions: ["v1", "v1beta1"]
  clientConfig:
    service:
      namespace: {{ .Release.Namespace }}
      name: {{ template "chart.name" . }}-admission
      path: /mutate-infrastructure-cluster-x-k8s-io-v1beta1-nutanixmachinetemplate
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["infrastructure.cluster.x-k8s.io"]
    apiVersions: ["v1beta1"]
    resources: ["nutanixmachinetemplates"]
  failurePolicy: Fail
  sideEffects: None
  timeoutSeconds: 10
