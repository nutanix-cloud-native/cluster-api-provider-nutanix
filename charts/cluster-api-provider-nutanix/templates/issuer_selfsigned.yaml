{{- if .Values.certificates.issuer.selfSigned }}
apiVersion: cert-manager.io/v1
kind: {{ .Values.certificates.issuer.kind }}
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: {{ template "chart.issuerName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
{{- end }}
