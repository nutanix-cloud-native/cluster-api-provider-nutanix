version: "2"
run:
  concurrency: 4
  # Devbox currently provides golangci-lint built with Go 1.24.
  # Keep lint parsing aligned until the packaged binary is rebuilt with Go 1.25+.
  go: "1.24"
  build-tags:
    - e2e
linters:
  enable:
    - gocognit
    - nolintlint
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
